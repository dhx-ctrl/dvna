name: DevSecOps - Security Scans (CI)

# ─────────────────────────────────────────────────────────────────────────────
# Target: DVNA — Damn Vulnerable Node Application
#         (https://github.com/appsecco/dvna)
#
# DVNA specifics
# ──────────────
#   • Pre-built image on Docker Hub: appsecco/dvna:sqlite
#     The :sqlite tag embeds SQLite so no external database is needed.
#   • Default port: 9090
#   • Single-container — no sidecar services required.
#
# Scanner enable-flags default to true. Set any to false to skip that scanner.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_dispatch:
    inputs:
      DOJO_PRODUCT_ID:
        description: "DefectDojo product ID for DVNA"
        required: false
        default: "3"
      ENABLE_SEMGREP:
        description: "Run Semgrep SAST?"
        required: false
        default: "true"
      ENABLE_TRIVY_FS:
        description: "Run Trivy filesystem scan?"
        required: false
        default: "true"
      ENABLE_TRIVY_IMAGE:
        description: "Run Trivy image scan?"
        required: false
        default: "true"
      ENABLE_ZAP:
        description: "Run OWASP ZAP DAST scan?"
        required: false
        default: "true"

jobs:
  security-scans:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 120

    env:
      SCAN_BASE_DIR: "/tmp/devsecops-scans"
      RUN_OUTPUT_DIR: "/tmp/devsecops-scans/${{ github.run_id }}"

      # ── Target configuration ──────────────────────────────────────────────
      APP_NAME:          "dvna"
      APP_URL:           "http://target-dvna:9090"
      APP_PORT:          "9090"
      DOCKER_IMAGE_NAME: "appsecco/dvna:sqlite"
      DOJO_PRODUCT_ID:   ${{ github.event.inputs.DOJO_PRODUCT_ID || '3' }}

      # ── Scanner enable/disable flags ────────────────────────────────────
      ENABLE_SEMGREP:      ${{ github.event.inputs.ENABLE_SEMGREP      || 'true' }}
      ENABLE_TRIVY_FS:     ${{ github.event.inputs.ENABLE_TRIVY_FS     || 'true' }}
      ENABLE_TRIVY_IMAGE:  ${{ github.event.inputs.ENABLE_TRIVY_IMAGE  || 'true' }}
      ENABLE_ZAP:          ${{ github.event.inputs.ENABLE_ZAP          || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Prepare output directory ───────────────────────────────────────────
      - name: Prepare scan output directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUN_OUTPUT_DIR"
          rm -f "$RUN_OUTPUT_DIR"/* || true
          echo "RUN_OUTPUT_DIR=$RUN_OUTPUT_DIR"
          echo "APP_NAME=$APP_NAME | APP_URL=$APP_URL | IMAGE=$DOCKER_IMAGE_NAME"
          echo "Scanners → semgrep=$ENABLE_SEMGREP trivy_fs=$ENABLE_TRIVY_FS trivy_image=$ENABLE_TRIVY_IMAGE zap=$ENABLE_ZAP"

      # ── Write scan metadata for the CD workflow ────────────────────────────
      - name: Write scan_meta.env
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUN_OUTPUT_DIR/scan_meta.env" <<EOF
          APP_NAME=${APP_NAME}
          APP_URL=${APP_URL}
          DOCKER_IMAGE_NAME=${DOCKER_IMAGE_NAME}
          DOJO_PRODUCT_ID=${DOJO_PRODUCT_ID}
          ENABLE_SEMGREP=${ENABLE_SEMGREP}
          ENABLE_TRIVY_FS=${ENABLE_TRIVY_FS}
          ENABLE_TRIVY_IMAGE=${ENABLE_TRIVY_IMAGE}
          ENABLE_ZAP=${ENABLE_ZAP}
          GIT_COMMIT=${{ github.sha }}
          GIT_BRANCH=${{ github.ref_name }}
          EOF
          echo "scan_meta.env written:"
          cat "$RUN_OUTPUT_DIR/scan_meta.env"

      # ── SAST: Semgrep ─────────────────────────────────────────────────────
      - name: "Semgrep SAST -> semgrep.json"
        if: env.ENABLE_SEMGREP == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker pull returntocorp/semgrep:latest
          docker run --rm \
            -v "${{ github.workspace }}:/src:ro" \
            -v "$RUN_OUTPUT_DIR:/out" \
            returntocorp/semgrep:latest \
            semgrep scan \
              --config=auto \
              --config=p/ci \
              --config=p/security-audit \
              --config=p/nodejs \
              --json \
              --output /out/semgrep.json \
              /src
          test -s "$RUN_OUTPUT_DIR/semgrep.json"
          echo "semgrep.json written ($(wc -c < "$RUN_OUTPUT_DIR/semgrep.json") bytes)"

      # ── SCA: Trivy filesystem ─────────────────────────────────────────────
      - name: "Trivy filesystem scan -> trivy_fs.json"
        if: env.ENABLE_TRIVY_FS == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker pull ghcr.io/aquasecurity/trivy:0.69.3
          docker run --rm \
            -v "${{ github.workspace }}:/workspace:ro" \
            -v "$RUN_OUTPUT_DIR:/out" \
            ghcr.io/aquasecurity/trivy:0.69.3 \
            fs \
            --scanners vuln,misconfig,secret,license \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --format json \
            --output /out/trivy_fs.json \
            /workspace
          test -s "$RUN_OUTPUT_DIR/trivy_fs.json"
          echo "trivy_fs.json written ($(wc -c < "$RUN_OUTPUT_DIR/trivy_fs.json") bytes)"

      # ── SCA: Trivy image ──────────────────────────────────────────────────
      - name: "Trivy image scan -> trivy_image.json"
        if: env.ENABLE_TRIVY_IMAGE == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker pull "$DOCKER_IMAGE_NAME"
          docker pull ghcr.io/aquasecurity/trivy:0.69.3
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$RUN_OUTPUT_DIR:/out" \
            ghcr.io/aquasecurity/trivy:0.69.3 \
            image \
            --scanners vuln,misconfig,secret \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --format json \
            --output /out/trivy_image.json \
            "$DOCKER_IMAGE_NAME"
          test -s "$RUN_OUTPUT_DIR/trivy_image.json"
          echo "trivy_image.json written ($(wc -c < "$RUN_OUTPUT_DIR/trivy_image.json") bytes)"

      # ── DAST: ZAP ────────────────────────────────────────────────────────
      - name: Create docker network (zapnet)
        if: env.ENABLE_ZAP == 'true'
        shell: bash
        run: docker network create zapnet || true

      - name: "Start target app for ZAP: dvna"
        if: env.ENABLE_ZAP == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker pull "$DOCKER_IMAGE_NAME"
          docker rm -f "target-${APP_NAME}" 2>/dev/null || true

          # DVNA :sqlite needs no external database.
          # DVNA_DB_DIALECT=sqlite tells the app to use the embedded SQLite store.
          docker run -d \
            --name "target-${APP_NAME}" \
            --network zapnet \
            -e "DVNA_DB_DIALECT=sqlite" \
            -p "${APP_PORT}:${APP_PORT}" \
            "$DOCKER_IMAGE_NAME"

          echo "Waiting for $APP_URL to become ready..."
          for i in {1..60}; do
            if curl -sSf "$APP_URL" >/dev/null 2>&1; then
              echo "$APP_NAME ready after ${i}×2s"
              break
            fi
            sleep 2
          done

      - name: "ZAP baseline scan -> zap.xml"
        if: env.ENABLE_ZAP == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run --rm --network zapnet \
            -v "${{ github.workspace }}:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t "$APP_URL" \
            -x zap.xml \
            -r zap.html || true   # ZAP exits non-zero when findings exist

          test -s zap.xml
          cp zap.xml "$RUN_OUTPUT_DIR/zap.xml"
          echo "zap.xml written ($(wc -c < "$RUN_OUTPUT_DIR/zap.xml") bytes)"

      - name: "Stop target app: dvna"
        if: always() && env.ENABLE_ZAP == 'true'
        shell: bash
        run: docker rm -f "target-${APP_NAME}" 2>/dev/null || true

      # ── Verify results ────────────────────────────────────────────────────
      - name: List scan results
        if: always()
        shell: bash
        run: |
          echo "=== Scan results in $RUN_OUTPUT_DIR ==="
          ls -la "$RUN_OUTPUT_DIR" || true

      # ── DEBUG: Inspect raw scan outputs ───────────────────────────────────
      - name: "[DEBUG] Inspect scan outputs"
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          inspect_semgrep() {
            python3 -c "
          import json, sys
          with open('$RUN_OUTPUT_DIR/semgrep.json') as f:
              d = json.load(f)
          results = d.get('results', [])
          errors  = d.get('errors', [])
          print(f'  findings : {len(results)}')
          print(f'  errors   : {len(errors)}')
          for i, r in enumerate(results[:5]):
              print(f'  [{i+1}] {r.get(\"check_id\",\"?\")} | {r.get(\"path\",\"?\")}:{r.get(\"start\",{}).get(\"line\",\"?\")} | severity={r.get(\"extra\",{}).get(\"severity\",\"?\")}')
          if len(results) > 5:
              print(f'  ... and {len(results)-5} more')
          "
          }

          inspect_trivy() {
            local file="$1"
            python3 -c "
          import json, sys
          with open('$RUN_OUTPUT_DIR/$file') as f:
              d = json.load(f)
          results = d.get('Results', [])
          total = sum(len(r.get('Vulnerabilities') or []) + len(r.get('Misconfigurations') or []) for r in results)
          print(f'  Result blocks : {len(results)} | Total vulns+misconfigs: {total}')
          count = 0
          for r in results:
              for v in (r.get('Vulnerabilities') or [])[:3]:
                  print(f'  [vuln] {v.get(\"VulnerabilityID\",\"?\")} | {v.get(\"PkgName\",\"?\")} | {v.get(\"Severity\",\"?\")}')
                  count += 1
                  if count >= 5: break
              if count >= 5: break
          " "$file"
          }

          inspect_zap() {
            python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$RUN_OUTPUT_DIR/zap.xml')
          root = tree.getroot()
          alerts    = root.findall('.//alertitem')
          instances = root.findall('.//instance')
          print(f'  alert types : {len(alerts)} | instances: {len(instances)}')
          for a in alerts[:5]:
              print(f'  [{a.findtext(\"alert\",\"?\")}] risk={a.findtext(\"riskdesc\",\"?\")} count={a.findtext(\"count\",\"?\")}')
          "
          }

          for scanner in semgrep trivy_fs trivy_image zap; do
            echo "══════════════════════════════════════════════════"
            echo "DEBUG: $scanner"
            echo "══════════════════════════════════════════════════"
            case "$scanner" in
              semgrep)
                [[ -s "$RUN_OUTPUT_DIR/semgrep.json" ]]     && inspect_semgrep          || echo "  SKIPPED / missing"
                ;;
              trivy_fs)
                [[ -s "$RUN_OUTPUT_DIR/trivy_fs.json" ]]    && inspect_trivy trivy_fs.json || echo "  SKIPPED / missing"
                ;;
              trivy_image)
                [[ -s "$RUN_OUTPUT_DIR/trivy_image.json" ]] && inspect_trivy trivy_image.json || echo "  SKIPPED / missing"
                ;;
              zap)
                [[ -s "$RUN_OUTPUT_DIR/zap.xml" ]]          && inspect_zap              || echo "  SKIPPED / missing"
                ;;
            esac
          done

      # ── Upload artifacts to GitHub ────────────────────────────────────────
      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ci-scan-results-${{ env.APP_NAME }}-${{ github.run_id }}"
          path: "/tmp/devsecops-scans/${{ github.run_id }}/*"

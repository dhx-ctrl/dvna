name: Import Scans -> DefectDojo (CD)

# ─────────────────────────────────────────────────────────────────────────────
# Triggers automatically after the CI workflow completes.
#
# All target-specific variables (APP_NAME, scanner flags, …) are read from
# the scan_meta.env file that CI wrote.  No per-app configuration needed here.
#
# DefectDojo hierarchy (resolved by name — no numeric IDs required):
#
#   Product Type  →  "CI-CD Apps"
#   Product       →  ${APP_NAME}   (from scan_meta.env)
#   Engagement    →  "DevSecOps-CICD"
#   Tests         →  "${APP_NAME} - Semgrep SAST", etc.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["DevSecOps - Security Scans (CI)"]
    types: [completed]

jobs:
  import-to-defectdojo:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      # ── DefectDojo connection ──────────────────────────────────────────────
      DOJO_URL: "http://localhost:8080"

      # ── DefectDojo hierarchy names ─────────────────────────────────────────
      # The import script resolves these by name → auto-creates if missing.
      # No numeric DOJO_PRODUCT_ID needed.
      DOJO_PRODUCT_TYPE_NAME: "CI-CD Apps"
      DOJO_ENGAGEMENT_NAME:   "DevSecOps-CICD"
      DOJO_ENGAGEMENT_LEAD_USERNAME: "admin"

      # ── DefectDojo scan-type parser names ──────────────────────────────────
      # These are DD's own parser identifiers — change only if you change
      # the DD parser configuration.
      SCAN_TYPE_TRIVY_FS:    "Trivy Scan"
      SCAN_TYPE_TRIVY_IMAGE: "Trivy Scan"
      SCAN_TYPE_ZAP:         "ZAP Scan"
      SCAN_TYPE_SEMGREP:     "Semgrep JSON Report"

      # ── CI/CD metadata ────────────────────────────────────────────────────
      BUILD_ID:      ${{ github.event.workflow_run.id }}
      COMMIT_HASH:   ${{ github.event.workflow_run.head_sha }}
      BRANCH_TAG:    ${{ github.event.workflow_run.head_branch }}
      REPO_URI:      "${{ github.server_url }}/${{ github.repository }}"
      TEST_STRATEGY: "https://github.com/${{ github.repository }}/actions"

      # ── Scan output folder (written by CI) ────────────────────────────────
      RUN_OUTPUT_DIR: "/tmp/devsecops-scans/${{ github.event.workflow_run.id }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify scan_meta.env exists
        shell: bash
        run: |
          if [[ ! -f "$RUN_OUTPUT_DIR/scan_meta.env" ]]; then
            echo "ERROR: $RUN_OUTPUT_DIR/scan_meta.env not found."
            echo "       Either the CI run did not complete its setup step,"
            echo "       or the output directory has been cleaned prematurely."
            exit 1
          fi
          echo "scan_meta.env found:"
          cat "$RUN_OUTPUT_DIR/scan_meta.env"

      - name: Import scans via script
        shell: bash
        env:
          DOJO_TOKEN: ${{ secrets.DOJO_TOKEN }}
        run: |
          set -euo pipefail
          bash .github/scripts/import_scans.sh

      - name: Cleanup run folder
        if: always()
        shell: bash
        run: rm -rf "$RUN_OUTPUT_DIR" || true
